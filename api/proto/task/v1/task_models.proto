syntax = "proto3";

package task.v1;

option go_package = "api/gen/go/task/v1;task_v1";

import "proto/common/v1/types.proto";
import "google/protobuf/timestamp.proto";

// Расширенная задача (с дополнительными данными)
message TaskExtended {
    common.v1.Task task = 1;            // Базовая информация о задаче
    repeated Comment comments = 2;      // Комментарии
    repeated Attachment attachments = 3; // Вложения
    UserBrief creator = 4;              // Краткая информация о создателе
    UserBrief assignee = 5;             // Краткая информация об исполнителе
    int32 comments_count = 6;           // Количество комментариев
    int32 attachments_count = 7;        // Количество вложений
}

// Краткая информация о пользователе (для минимизации данных)
message UserBrief {
    string id = 1;                      // ID пользователя
    string full_name = 2;               // Полное имя
    string email = 3;                   // Email
    common.v1.Role role = 4;            // Роль
}

// Комментарий
message Comment {
    string id = 1;                      // ID комментария
    string task_id = 2;                 // ID задачи
    string user_id = 3;                 // ID автора
    string user_name = 4;               // Имя автора
    string content = 5;                 // Текст комментария
    CommentType type = 6;               // Тип комментария
    google.protobuf.Timestamp created_at = 7; // Время создания
    google.protobuf.Timestamp updated_at = 8; // Время обновления
}

// Тип комментария
enum CommentType {
    COMMENT_TYPE_UNSPECIFIED = 0;
    COMMENT_TYPE_TEXT = 1;              // Текстовый комментарий
    COMMENT_TYPE_STATUS_CHANGE = 2;     // Изменение статуса
    COMMENT_TYPE_ASSIGNMENT = 3;        // Назначение исполнителя
    COMMENT_TYPE_SYSTEM = 4;            // Системное сообщение
}

// Вложение
message Attachment {
    string id = 1;                      // ID вложения
    string task_id = 2;                 // ID задачи
    string file_name = 3;               // Имя файла
    string file_url = 4;                // URL файла
    int64 file_size = 5;                // Размер в байтах
    string mime_type = 6;               // MIME тип
    string uploaded_by = 7;             // ID загрузившего
    string uploader_name = 8;           // Имя загрузившего
    google.protobuf.Timestamp uploaded_at = 9; // Время загрузки
}

// История изменений задачи
message TaskHistory {
    string id = 1;                      // ID записи истории
    string task_id = 2;                 // ID задачи
    string field_name = 3;              // Имя изменённого поля
    string old_value = 4;               // Старое значение
    string new_value = 5;               // Новое значение
    string changed_by = 6;              // ID изменившего
    string changer_name = 7;            // Имя изменившего
    google.protobuf.Timestamp changed_at = 8; // Время изменения
}